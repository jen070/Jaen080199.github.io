<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>末日围墙僵尸枪战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;user-select:none;}
body{overflow:hidden;background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;}
#gameCanvas{border:2px solid #444;background:#2d342c;}
.topBar{width:92%;max-width:720px;color:#fff;font-size:16px;padding:10px 0;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.hpWrap{display:flex;align-items:center;gap:6px}
.hpBox{width:120px;height:14px;background:#333;border-radius:4px;overflow:hidden;border:1px solid #666;}
.hpFill{height:100%;background:#e53e3e;transition:0.2s all;}
.armorText{color:#60a5fa;}
.gunBar{display:flex;gap:8px;align-items:center;}
.gunBtn{padding:5px 10px;border:none;border-radius:4px;background:#555;color:#fff;font-size:14px;cursor:pointer;}
.gunBtn.active{background:#d93025;}
.shopBtn{padding:6px 12px;border:none;border-radius:4px;background:#f59e0b;color:#fff;font-weight:bold;cursor:pointer;}
.tipText{color:#aaa;font-size:13px;margin-top:6px;text-align:center;}

/* 商店弹窗全局样式 */
.shopMask{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;z-index:9999;}
.shopBox{background:#222;border:2px solid #f59e0b;border-radius:12px;padding:20px;width:90%;max-width:420px;color:#fff;}
.shopTitle{text-align:center;font-size:22px;font-weight:bold;color:#f59e0b;margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid #444;}
.shopGold{text-align:right;margin-bottom:15px;font-size:16px;color:#ffd700;}
.shopItem{display:flex;justify-content:space-between;align-items:center;padding:12px 8px;border-bottom:1px solid #333;}
.itemName{font-size:15px;}
.itemPrice{color:#ffd700;margin:0 10px;}
.buyBtn{padding:4px 10px;background:#16a34a;border:none;border-radius:4px;color:#fff;cursor:pointer;}
.closeShop{width:100%;margin-top:20px;padding:10px;background:#d93025;border:none;border-radius:6px;color:#fff;font-size:16px;cursor:pointer;}
</style>
</head>
<body>
<div class="topBar">
    <div class="hpWrap">
        <span>生命值</span>
        <div class="hpBox"><div class="hpFill" id="hpFill"></div></div>
        <span class="armorText">护甲:<span id="armorNum">0</span></span>
    </div>
    <div>金币:<span id="goldNum" style="color:#ffd700;">0</span> | 弹药:<span id="ammoNum">12</span></div>
    <div class="gunBar">
        <button class="gunBtn active" data-gun="pistol">手枪</button>
        <button class="gunBtn lock" data-gun="rifle" style="background:#222;color:#888;cursor:not-allowed;">步枪🔒</button>
        <button class="gunBtn lock" data-gun="shotgun" style="background:#222;color:#888;cursor:not-allowed;">霰弹枪🔒</button>
        <button class="gunBtn lock" data-gun="sniper" style="background:#222;color:#888;cursor:not-allowed;">狙击枪🔒</button>
        <button class="shopBtn" onclick="openShop()">商店</button>
    </div>
</div>
<canvas id="gameCanvas"></canvas>
<div class="tipText">拖动屏幕拉出红线瞄准，松手开火；手枪/步枪长按固定位置自动连发，僵尸可绕墙追踪你</div>

<!-- 商店弹窗 -->
<div class="shopMask" id="shopMask">
    <div class="shopBox">
        <div class="shopTitle">武器弹药商店</div>
        <div class="shopGold">当前持有金币：<span id="shopGoldShow">0</span></div>
        <div class="shopList">
            <div class="shopItem">
                <span class="itemName">解锁全自动步枪 含30发备弹</span>
                <span class="itemPrice">50金币</span>
                <button class="buyBtn" onclick="buyGoods('unlockRifle',50)">购买解锁</button>
            </div>
            <div class="shopItem">
                <span class="itemName">解锁霰弹枪 含10发备弹</span>
                <span class="itemPrice">80金币</span>
                <button class="buyBtn" onclick="buyGoods('unlockShotgun',80)">购买解锁</button>
            </div>
            <div class="shopItem">
                <span class="itemName">解锁狙击枪 含10发备弹</span>
                <span class="itemPrice">120金币</span>
                <button class="buyBtn" onclick="buyGoods('unlockSniper',120)">购买解锁</button>
            </div>
            <div class="shopItem">
                <span class="itemName">手枪补充满弹12发</span>
                <span class="itemPrice">10金币</span>
                <button class="buyBtn" onclick="buyGoods('ammoPistol',10)">购买</button>
            </div>
            <div class="shopItem">
                <span class="itemName">步枪补充满弹30发</span>
                <span class="itemPrice">15金币</span>
                <button class="buyBtn" onclick="buyGoods('ammoRifle',15)">购买</button>
            </div>
            <div class="shopItem">
                <span class="itemName">霰弹枪补充满弹10发</span>
                <span class="itemPrice">20金币</span>
                <button class="buyBtn" onclick="buyGoods('ammoShotgun',20)">购买</button>
            </div>
            <div class="shopItem">
                <span class="itemName">狙击枪补充满弹10发</span>
                <span class="itemPrice">25金币</span>
                <button class="buyBtn" onclick="buyGoods('ammoSniper',25)">购买</button>
            </div>
        </div>
        <button class="closeShop" onclick="closeShop()">关闭商店返回游戏</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let canvasW,canvasH;
// 画布自适应
function resizeGame(){
    canvasW = Math.min(window.innerWidth - 20, 720);
    canvasH = Math.min(window.innerHeight - 200, 700);
    canvas.width = canvasW;
    canvas.height = canvasH;
}
resizeGame();
window.addEventListener('resize',resizeGame);

// 枪械全局配置 全贴合操作要求
const gunConfig = {
    pistol: {maxAmmo:12,autoFire:true,name:"小手枪",damage:10,unlock:true},
    rifle: {maxAmmo:30,autoFire:true,name:"全自动步枪",damage:15,unlock:false},
    shotgun: {maxAmmo:10,autoFire:false,name:"霰弹枪",damage:8,bulletNum:6,unlock:false},
    sniper: {maxAmmo:10,autoFire:false,name:"狙击枪",damage:80,unlock:false}
};
let nowGun = "pistol";
let nowAmmo = gunConfig.pistol.maxAmmo;
let totalGold = 0;

// 玩家基础属性
const player = {
    x: canvasW/2,
    y: canvasH/2,
    size:22,
    speed:3.5,
    hp:100,
    maxHp:100,
    armor:0,
    color:"#34d399"
};

// 全局游戏变量
let gameOver = false;
let zombies = [];
let walls = [];
let props = [];
let keys = {};
let touchDown = false;
let aimStartX = 0,aimStartY = 0;
let aimEndX = 0,aimEndY = 0;
let autoFireTimer = null;
let bullets = [];
const zombieGold = 10; // 所有僵尸统一击杀金币

// 生成方框围墙房屋障碍物
function initWallBox(){
    walls = [];
    // 随机生成方框围墙
    for(let i=0;i=6;i++){
        const w = 70 + Math.random()*50;
        const h = 70 + Math.random()*50;
        walls.push({
            x:60+Math.random()*(canvasW-120-w),
            y:60+Math.random()*(canvasH-120-h),
            w:w,h:h
        });
    }
}

// 碰撞通用检测
function pointInRect(px,py,rect){
    return px > rect.x && px < rect.x+rect.w && py > rect.y && py < rect.y+rect.h;
}
function circleCollide(a,b,r1,r2){
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    return Math.sqrt(dx*dx+dy*dy) < r1+r2;
}
// 圆形与墙体碰撞检测 禁止穿墙
function circleHitWall(obj,r){
    for(let wall of walls){
        if(pointInRect(obj.x,obj.y,wall)) return true;
        if(pointInRect(obj.x-r,obj.y,wall)) return true;
        if(pointInRect(obj.x+r,obj.y,wall)) return true;
        if(pointInRect(obj.x,obj.y-r,wall)) return true;
        if(pointInRect(obj.x,obj.y+r,wall)) return true;
    }
    return false;
}

// 僵尸智能绕墙寻路移动
function zombieMoveFindPath(zom){
    const baseAng = Math.atan2(player.y - zom.y, player.x - zom.x);
    let moveX = Math.cos(baseAng) * zom.speed;
    let moveY = Math.sin(baseAng) * zom.speed;

    // 预判前方撞墙，切换绕行方向
    let testZ = {...zom};
    testZ.x += moveX;
    testZ.y += moveY;
    if(circleHitWall(testZ,zom.size)){
        moveX = Math.cos(baseAng + Math.PI/3) * zom.speed;
        moveY = Math.sin(baseAng + Math.PI/3) * zom.speed;
        testZ.x = zom.x + moveX;
        testZ.y = zom.y + moveY;
        if(circleHitWall(testZ,zom.size)){
            moveX = Math.cos(baseAng - Math.PI/3) * zom.speed;
            moveY = Math.sin(baseAng - Math.PI/3) * zom.speed;
        }
    }
    zom.x += moveX;
    zom.y += moveY;
    // 边界限位
    zom.x = Math.max(zom.size, Math.min(canvasW-zom.size,zom.x));
    zom.y = Math.max(zom.size, Math.min(canvasH-zom.size,zom.y));
}

// 随机刷新护甲道具
function spawnArmorProp(){
    if(gameOver) return;
    let newProp;
    let noWallPos = false;
    while(!noWallPos){
        newProp = {
            x:Math.random()*(canvasW-40)+20,
            y:Math.random()*(canvasH-40)+20,
            size:16,type:"armor",value:20,color:"#60a5fa"
        };
        if(!circleHitWall(newProp,newProp.size)) noWallPos = true;
    }
    props.push(newProp);
}

// 多类型彩色标识僵尸生成
function spawnZombie(){
    if(gameOver) return;
    const rand = Math.random();
    let type = "normal",zColor="#9acd32";//普通僵尸黄绿色
    if(rand>0.75){type="dash";zColor="#ffc107";}//冲刺僵尸亮黄色
    else if(rand>0.6){type="jump";zColor="#ffff99";}//跳跃僵尸浅黄
    else if(rand>0.45){type="drag";zColor="#859900";}//拖拽僵尸深绿

    let zx,zy;
    const side = Math.floor(Math.random()*4);
    switch(side){
        case 0:zx=Math.random()*canvasW;zy=-25;break;
        case 1:zx=canvasW+25;zy=Math.random()*canvasH;break;
        case 2:zx=Math.random()*canvasW;zy=canvasH+25;break;
        case 3:zx=-25;zy=Math.random()*canvasH;break;
    }
    let speed=1.3,hp=40,size=19,skillCd=0;
    if(type==="dash"){speed=2.8;hp=30;size=17;}
    if(type==="jump"){speed=1.6;hp=35;size=18;}
    if(type==="drag"){speed=1.1;hp=60;size=23;}

    zombies.push({x:zx,y:zy,size,speed,hp,type,skillCd,color:zColor,hurtCd:0});
}

// 商店全局函数
function openShop(){
    document.getElementById('shopGoldShow').innerText = totalGold;
    document.getElementById('shopMask').style.display = 'flex';
    clearInterval(autoFireTimer);
    touchDown = false;
}
function closeShop(){
    document.getElementById('shopMask').style.display = 'none';
}
function buyGoods(type,cost){
    if(totalGold < cost){
        alert("金币不足，无法购买！");
        return;
    }
    totalGold -= cost;
    switch(type){
        case 'unlockRifle':
            gunConfig.rifle.unlock = true;
            document.querySelector('[data-gun="rifle"]').classList.remove('lock');
            document.querySelector('[data-gun="rifle"]').style.background='#555';
            document.querySelector('[data-gun="rifle"]').style.color='#fff';
            document.querySelector('[data-gun="rifle"]').style.cursor='pointer';
            nowAmmo = gunConfig.rifle.maxAmmo;
            break;
        case 'unlockShotgun':
            gunConfig.shotgun.unlock = true;
            document.querySelector('[data-gun="shotgun"]').classList.remove('lock');
            document.querySelector('[data-gun="shotgun"]').style.background='#555';
            document.querySelector('[data-gun="shotgun"]').style.color='#fff';
            document.querySelector('[data-gun="shotgun"]').style.cursor='pointer';
            nowAmmo = gunConfig.shotgun.maxAmmo;
            break;
        case 'unlockSniper':
            gunConfig.sniper.unlock = true;
            document.querySelector('[data-gun="sniper"]').classList.remove('lock');
            document.querySelector('[data-gun="sniper"]').style.background='#555';
            document.querySelector('[data-gun="sniper"]').style.color='#fff';
            document.querySelector('[data-gun="sniper"]').style.cursor='pointer';
            nowAmmo = gunConfig.sniper.maxAmmo;
            break;
        case 'ammoPistol':nowAmmo=gunConfig.pistol.maxAmmo;break;
        case 'ammoRifle':nowAmmo=gunConfig.rifle.maxAmmo;break;
        case 'ammoShotgun':nowAmmo=gunConfig.shotgun.maxAmmo;break;
        case 'ammoSniper':nowAmmo=gunConfig.sniper.maxAmmo;break;
    }
    document.getElementById('shopGoldShow').innerText = totalGold;
    updateUI();
}

// 枪械切换绑定
document.querySelectorAll('.gunBtn').forEach(btn=>{
    btn.addEventListener('click',()=>{
        if(btn.classList.contains('lock')) return alert('该武器尚未解锁，请前往商店购买');
        document.querySelectorAll('.gunBtn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        nowGun = btn.dataset.gun;
        nowAmmo = gunConfig[nowGun].maxAmmo;
        updateUI();
        clearInterval(autoFireTimer);
    });
});

// 键盘移动监听
window.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

// 触屏瞄准全逻辑
canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(gameOver||nowAmmo<=0) return;
    touchDown = true;
    aimStartX = player.x;
    aimStartY = player.y;
    const rect = canvas.getBoundingClientRect();
    aimEndX = e.touches[0].clientX - rect.left;
    aimEndY = e.touches[0].clientY - rect.top;
    if(gunConfig[nowGun].autoFire){
        autoFireTimer = setInterval(fireBullet,180);
    }
});
canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(!touchDown) return;
    const rect = canvas.getBoundingClientRect();
    aimEndX = e.touches[0].clientX - rect.left;
    aimEndY = e.touches[0].clientY - rect.top;
});
canvas.addEventListener('touchend',e=>{
    e.preventDefault();
    if(!touchDown) return;
    touchDown = false;
    if(!gunConfig[nowGun].autoFire){
        fireBullet();
    }
    clearInterval(autoFireTimer);
});

// 开火函数 子弹撞墙直接销毁
function fireBullet(){
    if(nowAmmo<=0||gameOver) return;
    nowAmmo--;
    const angle = Math.atan2(aimEndY-player.y,aimEndX-player.x);
    const cfg = gunConfig[nowGun];
    if(nowGun==="shotgun"){
        for(let i=0;i<cfg.bulletNum;i++){
            const randomAngle = angle + (Math.random()-0.5)*0.4;
            bullets.push({
                x:player.x,y:player.y,
                vx:Math.cos(randomAngle)*9,vy:Math.sin(randomAngle)*9,
                damage:cfg.damage,size:4
            });
        }
    }else{
        bullets.push({
            x:player.x,y:player.y,
            vx:Math.cos(angle)*11,vy:Math.sin(angle)*11,
            damage:cfg.damage,size:nowGun==="sniper"?6:4
        });
    }
    updateUI();
}

// UI刷新
function updateUI(){
    document.getElementById('hpFill').style.width = (player.hp/player.maxHp*100)+"%";
    document.getElementById('armorNum').innerText = player.armor;
    document.getElementById('ammoNum').innerText = nowAmmo;
    document.getElementById('goldNum').innerText = totalGold;
}

// 主游戏循环
function gameLoop(){
    if(gameOver){
        ctx.fillStyle="rgba(0,0,0,0.75)";
        ctx.fillRect(0,0,canvasW,canvasH);
        ctx.fillStyle="#fff";
        ctx.font="bold 28px sans-serif";
        ctx.textAlign="center";
        ctx.fillText("游戏结束",canvasW/2,canvasH/2-30);
        ctx.fillText("累计金币："+totalGold,canvasW/2,canvasH/2);
        ctx.fillText("刷新页面重新游玩",canvasW/2,canvasH/2+40);
        requestAnimationFrame(gameLoop);
        return;
    }
    ctx.clearRect(0,0,canvasW,canvasH);

    // 玩家移动+穿墙限制
    let px = player.x, py = player.y;
    if(keys['w']||keys['arrowup']) py-=player.speed;
    if(keys['s']||keys['arrowdown']) py+=player.speed;
    if(keys['a']||keys['arrowleft']) px-=player.speed;
    if(keys['d']||keys['arrowright']) px+=player.speed;
    let testP = {x:px,y:py};
    if(!circleHitWall(testP,player.size)){
        player.x = Math.max(player.size,Math.min(canvasW-player.size,px));
        player.y = Math.max(player.size,Math.min(canvasH-player.size,py));
    }

    // 绘制方框围墙房屋
    walls.forEach(wall=>{
        ctx.strokeStyle="#5c5c5c";
        ctx.lineWidth=6;
        ctx.strokeRect(wall.x,wall.y,wall.w,wall.h);
        ctx.fillStyle="#3a3a3a";
        ctx.fillRect(wall.x,wall.y,wall.w,wall.h);
    });

    // 护甲道具绘制拾取
    props.forEach((p,idx)=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();
        ctx.strokeStyle="#fff";
        ctx.stroke();
        if(circleCollide(player,p,player.size,p.size)){
            player.armor = Math.min(100,player.armor+p.value);
            props.splice(idx,1);
            updateUI();
        }
    });

    // 红色瞄准标线绘制
    if(touchDown){
        ctx.beginPath();
        ctx.moveTo(player.x,player.y);
        ctx.lineTo(aimEndX,aimEndY);
        ctx.strokeStyle="#ef4444";
        ctx.lineWidth=3;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(aimEndX,aimEndY,7,0,Math.PI*2);
        ctx.fillStyle="#ef4444";
        ctx.fill();
    }

    // 子弹更新 撞墙消失+僵尸命中
    bullets.forEach((b,bi)=>{
        b.x+=b.vx;b.y+=b.vy;
        // 子弹撞墙直接销毁
        if(circleHitWall(b,b.size)){
            bullets.splice(bi,1);
            return;
        }
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
        ctx.fillStyle="#fbbf24";
        ctx.fill();
        // 边界清除
        if(b.x<0||b.x>canvasW||b.y<0||b.y>canvasH){
            bullets.splice(bi,1);return;
        }
        // 命中僵尸
        zombies.forEach((z,zi)=>{
            if(circleCollide(b,z,b.size,z.size)){
                z.hp-=b.damage;
                bullets.splice(bi,1);
                if(z.hp<=0){
                    zombies.splice(zi,1);
                    totalGold += zombieGold;
                    updateUI();
                }
            }
        });
    });

    // 僵尸AI全逻辑 绕墙追踪+技能+伤害
    zombies.forEach(z=>{
        zombieMoveFindPath(z);
        z.skillCd--;
        // 特色僵尸技能
        if(z.type==="dash"&&z.skillCd<=0){
            z.speed=5;z.skillCd=90;
        }else if(z.type==="jump"&&z.skillCd<=0){
            const jumpAng = Math.atan2(player.y-z.y,player.x-z.x);
            z.x+=Math.cos(jumpAng)*60;
            z.y+=Math.sin(jumpAng)*60;
            z.skillCd=120;
        }else if(z.type==="drag"&&circleCollide(player,z,player.size+5,z.size)&&z.skillCd<=0){
            player.hp-=8;
            z.skillCd=60;
            updateUI();
        }
        if(z.type!=="dash") z.speed=z.type==="normal"?1.3:1.1;

        // 玩家受伤 护甲优先承伤
        if(circleCollide(player,z,player.size,z.size)&&z.hurtCd<=0){
            z.hurtCd=25;
            let hurt = 12;
            if(player.armor>0){
                const cut = Math.min(player.armor,hurt);
                player.armor-=cut;
                hurt-=cut;
            }
            player.hp-=hurt;
            updateUI();
            if(player.hp<=0) gameOver=true;
        }

        // 绘制彩色圆形僵尸标识
        ctx.beginPath();
        ctx.arc(z.x,z.y,z.size,0,Math.PI*2);
        ctx.fillStyle=z.color;
        ctx.fill();
        ctx.strokeStyle="#000";
        ctx.lineWidth=1;
        ctx.stroke();
    });

    // 绘制玩家
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
    ctx.fillStyle=player.color;
    ctx.fill();
    ctx.strokeStyle="#fff";
    ctx.lineWidth=2;
    ctx.stroke();

    requestAnimationFrame(gameLoop);
}

// 游戏初始化启动
initWallBox();
updateUI();
setInterval(spawnZombie,1100);
setInterval(spawnArmorProp,8000);
gameLoop();
</script>
</body>
</html>
