<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>末日围墙僵尸枪战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;user-select:none;}
body{overflow:hidden;background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;}
#gameCanvas{border:2px solid #444;background:#2d342c;}
.topBar{width:92%;max-width:720px;color:#fff;font-size:16px;padding:10px 0;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.hpWrap{display:flex;align-items:center;gap:6px}
.hpBox{width:120px;height:14px;background:#333;border-radius:4px;overflow:hidden;border:1px solid #666;}
.hpFill{height:100%;background:#e53e3e;transition:0.2s all;}
.armorText{color:#60a5fa;}
.gunBar{display:flex;gap:8px;align-items:center;}
.gunBtn{padding:5px 10px;border:none;border-radius:4px;background:#555;color:#fff;font-size:14px;cursor:pointer;}
.gunBtn.active{background:#d93025;}
.shopBtn{padding:6px 12px;border:none;border-radius:4px;background:#f59e0b;color:#fff;font-weight:bold;cursor:pointer;}
.tipText{color:#aaa;font-size:13px;margin-top:6px;text-align:center;}

.shopMask{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;z-index:9999;}
.shopBox{background:#222;border:2px solid #f59e0b;border-radius:12px;padding:20px;width:90%;max-width:420px;color:#fff;}
.shopTitle{text-align:center;font-size:22px;font-weight:bold;color:#f59e0b;margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid #444;}
